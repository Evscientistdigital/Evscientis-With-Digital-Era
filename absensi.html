<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Siswa</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
/* Reset & global */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
body{background:#f4f6fc;padding:20px;display:flex;justify-content:center;}
.container{max-width:450px;margin:auto;padding:20px;} /* layout simple */

/* Header & Logo */
.header{ background:white; border-radius:20px; padding:20px; text-align:center; box-shadow:0 8px 20px rgba(0,0,0,0.08); margin-bottom:20px; }
.logo img{width:70px;height:70px;margin-bottom:10px;object-fit:contain;}
.header h2{font-weight:600;color:#333;margin-bottom:10px;}

/* Dashboard Stats */
.dashboard{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin-top:10px; }
.stat-card{ background:white; padding:20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.05); text-align:center; transition:0.3s; }
.stat-card:hover{transform:translateY(-3px);}
.stat-number{font-size:24px;font-weight:700;color:#346dff;}
.stat-label{font-size:14px;color:#555;margin-top:5px;}

/* Tabs */
.tabs{ display:flex; background:#e6e9f5; border-radius:12px; overflow:hidden; margin-bottom:20px; }
.tab{ flex:1; text-align:center; padding:12px 0; cursor:pointer; font-weight:600; color:#666; transition:0.3s; }
.tab.active{background:white;color:#346dff;border-bottom:3px solid #346dff;}

/* Tab content */
.tab-content{display:none;background:white;border-radius:15px;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05);}
.tab-content.active{display:block;}

/* Input & Buttons */
input,select,button{ width:100%; padding:12px; margin:8px 0; border-radius:10px; border:1px solid #e1e4ec; font-size:15px; }
button{ background:#346dff; color:white; border:none; cursor:pointer; font-weight:600; transition:0.3s; }
button:hover{background:#2457e6;}
.btn-secondary{background:#6c757d;}
.btn-secondary:hover{background:#5a6268;}

/* Profile Card */
.profile-card{ display:flex; align-items:center; gap:15px; background:linear-gradient(135deg,#346dff,#2047c7); padding:15px; border-radius:12px; color:white; margin-bottom:15px; }
.profile-avatar{ width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,0.3); display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:20px; }

/* Table */
.table-container{max-height:350px;overflow:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;font-size:14px;border-bottom:1px solid #eee;}
th{background:#f4f6fc;position:sticky;top:0;text-align:left;}
.status-badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.status-hadir{background:#d4edda;color:#155724;}
.status-izin{background:#fff3cd;color:#856404;}
.status-sakit{background:#f8d7da;color:#721c24;}
.status-alpa{background:#f5c6cb;color:#721c24;}

/* Notif & Success */
.success{ position:fixed;top:20px;left:50%; transform:translateX(-50%); background:#28a745;color:white;padding:12px 20px;border-radius:10px;display:none; }
.notif{ position:fixed;bottom:20px;left:50%; transform:translateX(-50%); background:#dc3545;color:white;padding:12px 20px;border-radius:10px; opacity:0;transition:.3s; }
.notif.show{opacity:1;}

/* Login page style */
#loginPage{display:block;}
#dashboardPage{display:none;}
</style>
</head>
<body>
<div class="container">

<!-- ===== Login Page ===== -->
<div id="loginPage">
  <div class="logo"><img src="AOS.jpg" alt="Logo Sekolah"></div>
  <h2 style="text-align:center;">Login Absensi</h2>
  <input id="loginNIS" placeholder="NIS">
  <input type="password" id="loginPass" placeholder="Password">
  <button id="btnLogin">Login</button>
</div>

<!-- ===== Dashboard Page ===== -->
<div id="dashboardPage">
  <div class="header">
    <div class="logo"><img src="AOS.jpg" alt="Logo Sekolah"></div>
    <h2>Absensi Siswa</h2>
    <div class="dashboard">
      <div class="stat-card"><div class="stat-number" id="totalAbsen">0</div><div class="stat-label">Total Absen</div></div>
      <div class="stat-card"><div class="stat-number" id="hadirCount">0</div><div class="stat-label">Hadir</div></div>
      <div class="stat-card"><div class="stat-number" id="izinCount">0</div><div class="stat-label">Izin</div></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="absen">Absen</div>
    <div class="tab" data-tab="history">Riwayat</div>
  </div>

  <div id="absen" class="tab-content active">
    <div class="profile-card" id="profileCard" style="display:none">
      <div class="profile-avatar" id="avatar">A</div>
      <div>
        <div id="siswaNama"></div>
        <div>NIS : <span id="siswaNIS"></span></div>
      </div>
    </div>
    <input id="manualKelas" placeholder="Kelas / No Absen">
    <select id="manualStatus">
      <option value="Hadir">Hadir</option>
      <option value="Izin">Izin</option>
      <option value="Sakit">Sakit</option>
      <option value="Alpa">Alpa</option>
    </select>
    <input id="manualKet" placeholder="Keterangan">
    <button id="kirimAbsen">Kirim Absensi</button>
    <button class="btn-secondary" id="btnLogout">Logout</button>
    <center style="margin:10px 0">atau scan QR</center>
    <div id="reader"></div>
  </div>

  <div id="history" class="tab-content">
    <button id="printData" class="btn-secondary">Print</button>
    <button id="btnClearAll" class="btn-secondary">Hapus Semua Data</button>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>NIS</th>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Status</th>
            <th>Keterangan</th>
          </tr>
        </thead>
        <tbody id="absenTableBody">
          <tr><td colspan="6" align="center">Belum ada data</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div id="successMsg" class="success"></div>
<div id="notif" class="notif"></div>
</div>

<script>
const dataSiswa={
  "01":{nama:"Afgan Aditya",pass:"123"},
  "02":{nama:"Andin Amelian",pass:"123"},
  "03":{nama:"Anindya Novika",pass:"123"},
  "04":{nama:"Aryasatya Mustofa",pass:"123"},
  "05":{nama:"Asyla Nayla",pass:"123"},
  "010":{nama:"Dhiva Gina",pass:"123"},
  "011":{nama:"Dienda Rafita",pass:"123"},
  "033":{nama:"Wira Surya",pass:"123"}
};
let currentUser=null;
let isAdmin=false;
const ADMIN_PASSWORD="123456";

/* Notif & Success */
function showNotif(msg){const el=document.getElementById("notif");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2500);}
function showSuccess(msg){const el=document.getElementById("successMsg");el.textContent=msg;el.style.display="block";setTimeout(()=>el.style.display="none",2500);}

/* Login */
document.getElementById("btnLogin").onclick=()=>{
  const nis=document.getElementById("loginNIS").value;
  const pass=document.getElementById("loginPass").value;

  if(pass===ADMIN_PASSWORD){
    isAdmin=true;
    currentUser={nis:"ADMIN",nama:"ADMIN"};
    goDashboard();
    return;
  }
  const siswa=dataSiswa[nis];
  if(!siswa){showNotif("NIS tidak ditemukan");return;}
  if(pass && siswa.pass!==pass){showNotif("Password salah");return;}
  currentUser={nis, nama:siswa.nama};
  goDashboard();
};

function goDashboard(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("dashboardPage").style.display="block";
  document.getElementById("siswaNama").textContent=currentUser.nama;
  document.getElementById("siswaNIS").textContent=currentUser.nis;
  document.getElementById("avatar").textContent=currentUser.nama[0];
  document.getElementById("profileCard").style.display="flex";
}

/* Logout */
document.getElementById("btnLogout").onclick=()=>{
  currentUser=null;
  isAdmin=false;
  document.getElementById("dashboardPage").style.display="none";
  document.getElementById("loginPage").style.display="block";
};

/* Simpan absensi */
function simpanAbsensi(data){
  const absensi=JSON.parse(localStorage.getItem("absensi")||"[]");
  const today=new Date().toLocaleDateString("id-ID");
  if(absensi.some(a=>a.nis==data.nis&&a.tanggal==today)){showNotif("Sudah absen hari ini");return;}
  absensi.push(data);
  localStorage.setItem("absensi",JSON.stringify(absensi));
  renderTable(); updateStats(); showSuccess("Absensi berhasil");
}

document.getElementById("kirimAbsen").onclick=()=>{
  if(!currentUser){showNotif("Login dulu");return;}
  const kelas=document.getElementById("manualKelas").value;
  if(!kelas){showNotif("Isi kelas");return;}
  simpanAbsensi({
    tanggal:new Date().toLocaleDateString("id-ID"),
    nis:currentUser.nis,
    nama:currentUser.nama,
    kelas:kelas,
    status:document.getElementById("manualStatus").value,
    keterangan:document.getElementById("manualKet").value
  });
};

/* Render tabel */
function renderTable(){
  const data=JSON.parse(localStorage.getItem("absensi")||"[]");
  const tbody=document.getElementById("absenTableBody");
  if(data.length==0){tbody.innerHTML='<tr><td colspan="6" align="center">Belum ada data</td></tr>';return;}
  tbody.innerHTML=data.reverse().map(d=>`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.nis}</td>
      <td>${d.nama}</td>
      <td>${d.kelas}</td>
      <td><span class="status-badge status-${d.status.toLowerCase()}">${d.status}</span></td>
      <td>${d.keterangan}</td>
    </tr>`).join("");
}

/* Update stats */
function updateStats(){
  const absensi=JSON.parse(localStorage.getItem("absensi")||"[]");
  document.getElementById("totalAbsen").textContent=absensi.length;
  document.getElementById("hadirCount").textContent=absensi.filter(a=>a.status=="Hadir").length;
  document.getElementById("izinCount").textContent=absensi.filter(a=>a.status=="Izin").length;
}

/* Print & Clear */
document.getElementById("printData").onclick=()=>window.print();
document.getElementById("btnClearAll").onclick=()=>{
  if(!isAdmin){showNotif("Hanya admin yang bisa menghapus data"); return;}
  if(confirm("Yakin hapus semua data?")){ localStorage.removeItem("absensi"); renderTable(); updateStats(); showNotif("Semua data dihapus"); }
};

/* Tab switch */
document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick=()=>{
    if(tab.dataset.tab==="absen" && !currentUser){ showNotif("Login dulu untuk mengakses Absen"); return; }
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.tab).classList.add("active");
  }
});

/* QR scanner */
const qr=new Html5Qrcode("reader");
Html5Qrcode.getCameras().then(cameras=>{
  if(cameras.length){qr.start(cameras[0].id,{fps:10,qrbox:200},decoded=>{
    // Login via QR
    if(dataSiswa[decoded]){
      currentUser={nis:decoded,nama:dataSiswa[decoded].nama};
      goDashboard();
    }
  },error=>{});}
});

/* Initial render */
renderTable(); updateStats();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Siswa - Profesional</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
body{background:#f4f6fc;}
.container{display:flex;max-width:800px;margin:40px auto;background:white;border-radius:15px;overflow:hidden;box-shadow:0 8px 25px rgba(0,0,0,0.1);}

/* Sidebar */
.sidebar{width:220px;background:#346dff;color:white;padding:20px;display:flex;flex-direction:column;align-items:center;}
.sidebar h2{margin-bottom:20px;}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.3);display:flex;justify-content:center;align-items:center;font-weight:bold;font-size:24px;margin-bottom:10px;}
.sidebar .btn-logout{margin-top:auto;width:100%;padding:10px;border:none;border-radius:10px;background:#ff5c5c;color:white;cursor:pointer;transition:.3s;}
.sidebar .btn-logout:hover{background:#e04b4b;}

/* Main content */
.main{flex:1;padding:20px;}
.card{background:white;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.05);margin-bottom:20px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px;}
.stat-card{background:#f4f6fc;padding:15px;border-radius:12px;text-align:center;}
.stat-number{font-size:22px;font-weight:700;color:#346dff;}
.stat-label{font-size:14px;color:#555;}

/* Form absensi */
input,select,button{width:100%;padding:10px;margin:8px 0;border-radius:10px;border:1px solid #e1e4ec;font-size:14px;}
button{background:#346dff;color:white;border:none;cursor:pointer;font-weight:600;transition:0.3s;}
button:hover{background:#2457e6;}

/* Table */
.table-container{max-height:250px;overflow:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px;font-size:13px;border-bottom:1px solid #eee;}
th{background:#f4f6fc;position:sticky;top:0;text-align:left;}
.status-badge{padding:4px 8px;border-radius:12px;font-size:12px;font-weight:600;}
.status-hadir{background:#d4edda;color:#155724;}
.status-izin{background:#fff3cd;color:#856404;}
.status-sakit{background:#f8d7da;color:#721c24;}
.status-alpa{background:#f5c6cb;color:#721c24;}

/* Notif */
.success{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#28a745;color:white;padding:12px 20px;border-radius:10px;display:none;}
.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#dc3545;color:white;padding:12px 20px;border-radius:10px;opacity:0;transition:.3s;}
.notif.show{opacity:1;}
</style>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="profile-avatar" id="avatar">A</div>
    <h2 id="siswaNama">Siswa</h2>
    <div id="siswaNIS">NIS: -</div>
    <button class="btn-logout" id="btnLogout">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="card stats">
      <div class="stat-card"><div class="stat-number" id="totalAbsen">0</div><div class="stat-label">Total Absen</div></div>
      <div class="stat-card"><div class="stat-number" id="hadirCount">0</div><div class="stat-label">Hadir</div></div>
      <div class="stat-card"><div class="stat-number" id="izinCount">0</div><div class="stat-label">Izin</div></div>
    </div>

    <div class="card">
      <h3>Form Absensi</h3>
      <input id="manualKelas" placeholder="Kelas / No Absen">
      <select id="manualStatus">
        <option value="Hadir">Hadir</option>
        <option value="Izin">Izin</option>
        <option value="Sakit">Sakit</option>
        <option value="Alpa">Alpa</option>
      </select>
      <input id="manualKet" placeholder="Keterangan">
      <button id="kirimAbsen">Kirim Absensi</button>
    </div>

    <div class="card table-container">
      <h3>Riwayat Absensi</h3>
      <table>
        <thead>
          <tr>
            <th>Tanggal</th>
            <th>NIS</th>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Status</th>
            <th>Keterangan</th>
          </tr>
        </thead>
        <tbody id="absenTableBody">
          <tr><td colspan="6" align="center">Belum ada data</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="successMsg" class="success"></div>
<div id="notif" class="notif"></div>

<script>
const dataSiswa={
"01":{nama:"Afgan Aditya",pass:"123"},
"02":{nama:"Andin Amelian",pass:"123"},
"03":{nama:"Anindya Novika",pass:"123"},
"04":{nama:"Aryasatya Mustofa",pass:"123"},
"05":{nama:"Asyla Nayla",pass:"123"},
"010":{nama:"Dhiva Gina",pass:"123"},
"011":{nama:"Dienda Rafita",pass:"123"},
"033":{nama:"Wira Surya",pass:"123"}
};
let currentUser={nis:"01",...dataSiswa["01"]}; // contoh sudah login

/* Notif & Success */
function showNotif(msg){const el=document.getElementById("notif");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2500);}
function showSuccess(msg){const el=document.getElementById("successMsg");el.textContent=msg;el.style.display="block";setTimeout(()=>el.style.display="none",2500);}

/* Render profile */
document.getElementById("siswaNama").textContent=currentUser.nama;
document.getElementById("siswaNIS").textContent="NIS: "+currentUser.nis;
document.getElementById("avatar").textContent=currentUser.nama[0];

/* Simpan absensi */
function simpanAbsensi(data){
  const absensi=JSON.parse(localStorage.getItem("absensi")||"[]");
  const today=new Date().toLocaleDateString("id-ID");
  if(absensi.some(a=>a.nis==data.nis&&a.tanggal==today)){showNotif("Sudah absen hari ini");return;}
  absensi.push(data); 
  localStorage.setItem("absensi",JSON.stringify(absensi));
  renderTable();
  updateStats();
  showSuccess("Absensi berhasil");
}

/* Kirim absen */
document.getElementById("kirimAbsen").onclick=()=>{
  const kelas=document.getElementById("manualKelas").value;
  if(!kelas){showNotif("Isi kelas");return;}
  simpanAbsensi({
    tanggal:new Date().toLocaleDateString("id-ID"),
    nis:currentUser.nis,
    nama:currentUser.nama,
    kelas:kelas,
    status:document.getElementById("manualStatus").value,
    keterangan:document.getElementById("manualKet").value
  });
};

/* Render tabel */
function renderTable(){
  const data=JSON.parse(localStorage.getItem("absensi")||"[]");
  const tbody=document.getElementById("absenTableBody");
  if(data.length==0){tbody.innerHTML='<tr><td colspan="6" align="center">Belum ada data</td></tr>';return;}
  tbody.innerHTML=data.reverse().map(d=>`
    <tr>
      <td>${d.tanggal}</td>
      <td>${d.nis}</td>
      <td>${d.nama}</td>
      <td>${d.kelas}</td>
      <td><span class="status-badge status-${d.status.toLowerCase()}">${d.status}</span></td>
      <td>${d.keterangan}</td>
    </tr>`).join("");
}

/* Update stats */
function updateStats(){
  const absensi=JSON.parse(localStorage.getItem("absensi")||"[]");
  document.getElementById("totalAbsen").textContent=absensi.length;
  document.getElementById("hadirCount").textContent=absensi.filter(a=>a.status=="Hadir").length;
  document.getElementById("izinCount").textContent=absensi.filter(a=>a.status=="Izin").length;
}

/* Logout */
document.getElementById("btnLogout").onclick=()=>{
  showNotif("Logout berhasil");
  location.reload();
};

/* Initial render */
renderTable(); updateStats();
</script>

</body>
</html>

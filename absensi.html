<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absensi Siswa</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
/* === STYLE SAMA PERSIS DENGAN KODEMU === */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#f5f7fb;padding:20px;}
.container{max-width:500px;margin:auto;}
.header{background:white;padding:25px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.1);margin-bottom:20px;}
.logo{font-size:40px;margin-bottom:10px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px;}
.stat-card{background:#f3f5fa;padding:12px;border-radius:12px;text-align:center;}
.stat-number{font-size:20px;font-weight:bold;}
.card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.1);}
.tabs{display:flex;background:#f3f5fa;}
.tab{flex:1;padding:15px;text-align:center;cursor:pointer;font-weight:600;color:#666;}
.tab.active{background:white;color:#346dff;border-bottom:3px solid #346dff;}
.tab-content{display:none;padding:25px;}
.tab-content.active{display:block;}
input,select,button{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #e1e4ec;font-size:16px;}
button{background:#346dff;color:white;border:none;font-weight:600;cursor:pointer;}
button:hover{background:#2457e6;}
.btn-secondary{background:#6c757d;}
#reader{width:100%;height:220px;border-radius:12px;overflow:hidden;margin-top:10px;}
.profile-card{background:linear-gradient(135deg,#346dff,#2047c7);color:white;padding:18px;border-radius:15px;display:flex;align-items:center;gap:12px;margin-bottom:15px;}
.profile-avatar{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;}
.table-container{max-height:350px;overflow:auto;}
table{width:100%;border-collapse:collapse;}
th,td{padding:10px;font-size:13px;border-bottom:1px solid #eee;}
th{background:#f5f7fb;position:sticky;top:0;}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.status-hadir{background:#d4edda;color:#155724;}
.status-izin{background:#fff3cd;color:#856404;}
.status-sakit{background:#f8d7da;color:#721c24;}
.status-alpa{background:#f5c6cb;color:#721c24;}
.success{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#28a745;color:white;padding:12px 20px;border-radius:10px;display:none;}
.notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#dc3545;color:white;padding:12px 20px;border-radius:10px;opacity:0;transition:.3s;}
.notif.show{opacity:1;}
</style>
</head>

<body>
<div class="container">

<div class="header">
<div class="logo">📚</div>
<h2>Absensi Siswa</h2>
<div class="stats">
<div class="stat-card">
<div class="stat-number" id="totalAbsen">0</div>
<div>Total</div>
</div>
<div class="stat-card">
<div class="stat-number" id="hadirCount">0</div>
<div>Hadir</div>
</div>
<div class="stat-card">
<div class="stat-number" id="izinCount">0</div>
<div>Izin</div>
</div>
</div>
</div>

<div class="card">

<div class="tabs">
<div class="tab active" data-tab="login">Login</div>
<div class="tab" data-tab="absen">Absen</div>
<div class="tab" data-tab="history">Riwayat</div>
<div class="tab" data-tab="admin">Admin</div>
</div>

<!-- LOGIN SISWA -->
<div id="login" class="tab-content active">
<input id="loginNIS" placeholder="NIS">
<input type="password" id="loginPass" placeholder="Password">
<button id="btnLogin">Login</button>
<center style="margin:10px 0">atau scan QR</center>
<div id="reader"></div>
</div>

<!-- ABSEN SISWA -->
<div id="absen" class="tab-content">
<div class="profile-card" id="profileCard" style="display:none">
<div class="profile-avatar" id="avatar">A</div>
<div>
<div id="siswaNama"></div>
<div>NIS : <span id="siswaNIS"></span></div>
</div>
</div>

<input id="manualKelas" placeholder="Kelas / No Absen">
<select id="manualStatus">
<option value="Hadir">Hadir</option>
<option value="Izin">Izin</option>
<option value="Sakit">Sakit</option>
<option value="Alpa">Alpa</option>
</select>
<input id="manualKet" placeholder="Keterangan">
<button id="kirimAbsen">Kirim Absensi</button>
<button class="btn-secondary" id="btnLogout">Logout</button>
</div>

<!-- RIWAYAT -->
<div id="history" class="tab-content">
<button id="printData" class="btn-secondary">Print</button>
<div class="table-container">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>NIS</th>
<th>Nama</th>
<th>Kelas</th>
<th>Status</th>
<th>Ket</th>
</tr>
</thead>
<tbody id="absenTableBody">
<tr><td colspan="6" align="center">Belum ada data</td></tr>
</tbody>
</table>
</div>
</div>

<!-- LOGIN ADMIN -->
<div id="admin" class="tab-content">
<input id="adminUser" placeholder="Username Admin">
<input type="password" id="adminPass" placeholder="Password Admin">
<button id="btnAdminLogin">Login Admin</button>

<div id="adminPanel" style="display:none; margin-top:10px;">
<button id="btnClearAll" class="btn-secondary">Hapus Semua Data</button>
<button onclick="logoutAdmin()" class="btn-secondary">Logout Admin</button>
</div>
</div>

</div>
</div>

<div id="successMsg" class="success"></div>
<div id="notif" class="notif"></div>

<script>
/* DATA SISWA */
const dataSiswa={
"01":{nama:"Afgan Aditya",pass:"123"},
"02":{nama:"Andin Amelian",pass:"123"},
"03":{nama:"Anindya Novika",pass:"123"},
"04":{nama:"Aryasatya Mustofa",pass:"123"},
"05":{nama:"Asyla Nayla",pass:"123"},
"010":{nama:"Dhiva Gina",pass:"123"},
"011":{nama:"Dienda Rafita",pass:"123"},
"033":{nama:"Wira Surya",pass:"123"}
};

let currentUser=null;

/* ADMIN LOGIN */
const ADMIN_USERNAME="admin";
const ADMIN_PASSWORD="123456";

/* NOTIF & SUCCESS */
function showNotif(msg){
const el=document.getElementById("notif"); el.textContent=msg; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2500);
}
function showSuccess(msg){
const el=document.getElementById("successMsg"); el.textContent=msg; el.style.display="block"; setTimeout(()=>el.style.display="none",2500);
}

/* LOGIN SISWA */
function login(nis,pass){
const siswa=dataSiswa[nis];
if(!siswa){showNotif("NIS tidak ditemukan"); return;}
if(pass && siswa.pass!==pass){showNotif("Password salah"); return;}
currentUser={nis,...siswa};
document.getElementById("siswaNama").textContent=siswa.nama;
document.getElementById("siswaNIS").textContent=nis;
document.getElementById("avatar").textContent=siswa.nama[0];
document.getElementById("profileCard").style.display="flex";
document.querySelector('[data-tab="absen"]').click();
showNotif("Login berhasil");
}
function logout(){currentUser=null;document.getElementById("profileCard").style.display="none";document.querySelector('[data-tab="login"]').click();}

/* LOGIN ADMIN */
function loginAdmin(){
const user=document.getElementById("adminUser").value.trim();
const pass=document.getElementById("adminPass").value.trim();
if(user===ADMIN_USERNAME && pass===ADMIN_PASSWORD){
document.getElementById("adminPanel").style.display="block";
showNotif("Login Admin Berhasil");
}else{
showNotif("Username / Password Admin Salah");
}
}
function logoutAdmin(){
document.getElementById("adminPanel").style.display="none";
document.getElementById("adminUser").value="";
document.getElementById("adminPass").value="";
showNotif("Admin logout berhasil");
}

/* ABSENSI */
function simpanAbsensi(data){
const absensi=JSON.parse(localStorage.getItem("absensi")||"[]");
const today=new Date().toLocaleDateString("id-ID");
if(absensi.some(a=>a.nis==data.nis&&a.tanggal==today)){showNotif("Sudah absen hari ini"); return;}
absensi.push(data); localStorage.setItem("absensi",JSON.stringify(absensi));
renderTable(); updateStats(); showSuccess("Absensi berhasil");
}
document.getElementById("kirimAbsen").onclick=()=>{
if(!currentUser){showNotif("Login dulu"); return;}
const kelas=document.getElementById("manualKelas").value;
if(!kelas){showNotif("Isi kelas"); return;}
simpanAbsensi({
tanggal:new Date().toLocaleDateString("id-ID"),
nis:currentUser.nis,
nama:currentUser.nama,
kelas:kelas,
status:document.getElementById("manualStatus").value,
keterangan:document.getElementById("manualKet").value
});
}

/* TABLE & STATS */
function renderTable(){
const data=JSON.parse(localStorage.getItem("absensi")||"[]");
const tbody=document.getElementById("absenTableBody");
if(data.length==0){tbody.innerHTML='<tr><td colspan="6" align="center">Belum ada data</td></tr>'; return;}
tbody.innerHTML=data.reverse().map(d=>`
<tr>
<td>${d.tanggal}</td>
<td>${d.nis}</td>
<td>${d.nama}</td>
<td>${d.kelas}</td>
<td><span class="status-badge status-${d.status.toLowerCase()}">${d.status}</span></td>
<td>${d.keterangan}</td>
</tr>`).join("");
}
function updateStats(){
const absensi=JSON.parse(localStorage.getItem("absensi")||"[]");
document.getElementById("totalAbsen").textContent=absensi.length;
document.getElementById("hadirCount").textContent=absensi.filter(a=>a.status=="Hadir").length;
document.getElementById("izinCount").textContent=absensi.filter(a=>a.status=="Izin").length;
}

/* PRINT & CLEAR ADMIN */
document.getElementById("printData").onclick=()=>window.print();
document.getElementById("btnClearAll").onclick=()=>{
if(confirm("Yakin hapus semua data?")){localStorage.removeItem("absensi");renderTable();updateStats();showNotif("Semua data dihapus");}
}

/* TAB SWITCH */
document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
tab.classList.add("active");
document.getElementById(tab.dataset.tab).classList.add("active");
}
});

/* EVENTS SISWA */
document.getElementById("btnLogin").onclick=()=>login(
document.getElementById("loginNIS").value,
document.getElementById("loginPass").value
);
document.getElementById("btnLogout").onclick=logout;

/* EVENTS ADMIN */
document.getElementById("btnAdminLogin").onclick=loginAdmin;

/* QR SCANNER */
const qr=new Html5Qrcode("reader");
Html5Qrcode.getCameras().then(cameras=>{
if(cameras.length){qr.start(cameras[0].id,{fps:10,qrbox:200},decoded=>{login(decoded)},error=>{});}
});

/* INITIAL RENDER */
renderTable(); updateStats();
</script>

</body>
</html>
